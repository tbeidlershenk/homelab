name: CI and Deploy

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

jobs:
    test:
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Run Install Script
              working-directory: ${{ github.workspace }}
              env:
                  DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
                  DOPPLER_CONFIG: ${{ secrets.DOPPLER_CONFIG }}
                  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
              run: |
                  sudo -E ./scripts/install.sh

            - name: Run Prepare Script
              working-directory: ${{ github.workspace }}
              env:
                  DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
                  DOPPLER_CONFIG: ${{ secrets.DOPPLER_CONFIG }}
                  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
              run: |
                  sudo -E ./scripts/prepare.sh

            - name: Run Backup Script
              working-directory: ${{ github.workspace }}
              env:
                  DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
                  DOPPLER_CONFIG: ${{ secrets.DOPPLER_CONFIG }}
                  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
              run: |
                  sudo -E ./scripts/backup.sh

    deploy:
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            # Deploy to homelab over Tailscale SSH
            - name: Connect Tailscale
              uses: tailscale/github-action@v3
              with:
                  authkey: ${{ secrets.TAILSCALE_CI_AUTHKEY }}
                  statedir: /tmp/tailscale-state/

            - name: Deploy to server
              run: |
                  curl -s http://homelab:5001/tasks/run/deploy
                  for i in {1..60}; do
                    echo "Polling server - attempt $i/60"
                    RESP=$(curl -s http://homelab:5001/maintenance/status)
                    VERSION=$(echo $RESP | jq -r .version)
                    STATUS=$(echo $RESP | jq -r .status)

                    if [ "$VERSION" = "$EXPECTED_SHA" ] && [ "$STATUS" = "success" ]; then
                        echo "Deploy succeeded"
                        exit 0
                    fi

                    sleep 5
                  done

                  echo "Deploy failed - timed out"
                  echo "Status: $STATUS"
                  echo "Commit SHA: $VERSION, Expected: $EXPECTED_SHA"
                  exit 1
